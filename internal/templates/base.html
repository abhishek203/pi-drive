{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>{{template "title" .}}</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: #1a1a1a;
      background-color: #f5f5f5;
    }
    @media (prefers-color-scheme: dark) {
      body {
        color: #e5e5e5;
        background-color: #1a1a1a;
      }
      .container {
        background-color: #2a2a2a !important;
      }
      .code-block {
        background-color: #1a1a1a !important;
        border-color: #404040 !important;
      }
      .footer {
        color: #888 !important;
      }
    }
    .wrapper {
      padding: 40px 20px;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      padding: 40px;
    }
    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #6366f1;
      margin-bottom: 32px;
    }
    .code-block {
      background-color: #f8f8f8;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 16px;
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, monospace;
      font-size: 14px;
      overflow-x: auto;
      margin: 16px 0;
    }
    .verification-code {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 4px;
      text-align: center;
      padding: 24px;
      background-color: #f0f0ff;
      border-radius: 8px;
      color: #6366f1;
      margin: 24px 0;
    }
    .footer {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e5e5e5;
      font-size: 13px;
      color: #666;
    }
    .muted {
      color: #666;
      font-size: 14px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 16px 0;
    }
    p {
      margin: 0 0 16px 0;
    }
    a {
      color: #6366f1;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="logo">pidrive</div>
      {{template "content" .}}
      <div class="footer">
        <p>pidrive — Private file storage for AI agents</p>
        <p><a href="https://pidrive.ressl.ai">pidrive.ressl.ai</a></p>
      </div>
    </div>
  </div>
</body>
</html>
{{end}}
